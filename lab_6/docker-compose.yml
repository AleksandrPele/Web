version: '3.8'
services:
  php:
    build: .
    container_name: lab6_php
    volumes:
      - ./www:/var/www/html
    ports:
      - "8080:80"
    depends_on:
      - redis
    networks:
      - default_network

  redis:
    image: redis:7
    container_name: lab6_redis
    ports:
      - "6379:6379"
    networks:
      - default_network

networks:
  default_network:
    driver: bridge